<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Spoken English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-page">
    <main class="login-view" aria-labelledby="login-title">
      <section class="login-panel">
        <div class="login-brand">
          <span class="material-symbols-outlined">school</span>
          <strong>Spoken English</strong>
        </div>
        <h1 id="login-title">Sign in</h1>
        <form class="login-form" id="loginForm">
          <label>
            Name
            <input id="loginName" type="text" placeholder="Name" autocomplete="name" />
          </label>
          <label>
            Email
            <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" required />
          </label>
          <div class="login-actions">
            <button class="primary-button" id="loginSubmit" type="submit">
              Sign In
              <span class="material-symbols-outlined">login</span>
            </button>
            <button class="secondary-button" id="createAccountButton" type="button">
              Create Account
              <span class="material-symbols-outlined">person_add</span>
            </button>
          </div>
          <p class="login-error" id="loginError" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
